<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Frag' Libby – Agenda Austria</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="screen">

  <div id="chat">
    <div class="chat-inner">
      <div class="chat-title">
        <h1>Frag' Libby</h1>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-inner">

      <div id="key-banner">
        <p>Einmaliger Setup: Anthropic API Key eingeben (wird lokal gespeichert)</p>
        <div id="key-row">
          <input type="password" id="key-input" placeholder="sk-ant-...">
          <button id="key-save" onclick="saveKey()">Speichern</button>
        </div>
      </div>

      <div class="input-row">
        <form id="chat-form" onsubmit="send(event)">
          <input type="text" id="msg" placeholder="Stell mir eine Frage …" autocomplete="off" required>
          <button type="button" class="mic-btn" id="mic-btn" onclick="toggleDictation()" title="Spracheingabe">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <rect x="6" y="1" width="6" height="9" rx="3" fill="currentColor"/>
              <path d="M3 9a6 6 0 0012 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
              <line x1="9" y1="15" x2="9" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="6.5" y1="17" x2="11.5" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="send-btn" type="submit" id="btn">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none" aria-hidden="true">
              <path d="M8.5 14V3M3.5 8L8.5 3l5 5" stroke="white" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
      </div>

    </div>
  </div>

</div>

<script src="sources.js" defer></script>
<script src="libby.js" defer></script>
</body>
</html>
